name: Deploy docs to GitHub Pages

on:
  # Deploy whenever main updates, or on demand from the Actions tab.
  push:
    branches: [main]
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Turns GitHub Pages on for the repo if it isn't already, so the very
      # first run deploys without needing the Settings → Pages toggle.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build -w @glacier/docs
        env:
          # The site is served from https://<user>.github.io/GlacierUI/.
          # Change this if the repository is renamed or served elsewhere.
          BASE_PATH: /GlacierUI/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
